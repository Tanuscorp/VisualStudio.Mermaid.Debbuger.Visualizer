name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.2.3)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $v = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrEmpty($v)) { $v = "${{ github.ref_name }}".TrimStart("v") }
          Write-Host "Version: $v"
          "value=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build (Release)
        run: dotnet build MermaidVisualizer.slnx -c Release -p:Version=${{ steps.version.outputs.value }}

      - name: Test
        run: dotnet test src/Naiad.Tests/Naiad.Tests.csproj -c Release --no-build

      - name: Locate VSIX
        id: vsix
        shell: pwsh
        run: |
          $vsix = Get-ChildItem -Recurse -Filter *.vsix -Path src/MermaidDebugVisualizer/bin/Release |
                  Select-Object -First 1
          if ($null -eq $vsix) { Write-Error "No .vsix produced"; exit 1 }
          "path=$($vsix.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Explicit tag so the workflow works both on tag pushes and on manual
          # workflow_dispatch runs (which check out a branch, not a tag). On dispatch
          # this creates the tag at the checked-out commit.
          tag_name: v${{ steps.version.outputs.value }}
          target_commitish: ${{ github.sha }}
          files: ${{ steps.vsix.outputs.path }}
          generate_release_notes: true

      # Publishes to the Visual Studio Marketplace. Requires:
      #   - the VS_MARKETPLACE_PAT secret (Azure DevOps PAT, Marketplace > Manage scope)
      #   - the "publisher" field filled in publish-manifest.json
      # Skipped automatically if the secret is not configured.
      - name: Publish to Marketplace
        if: ${{ env.VS_MARKETPLACE_PAT != '' }}
        env:
          VS_MARKETPLACE_PAT: ${{ secrets.VS_MARKETPLACE_PAT }}
        shell: pwsh
        run: |
          $publisher = Get-ChildItem -Recurse -Filter VsixPublisher.exe `
              -Path "${env:ProgramFiles}\Microsoft Visual Studio", "${env:ProgramFiles(x86)}\Microsoft Visual Studio" `
              -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $publisher) {
            Write-Warning "VsixPublisher.exe not found on this runner; skipping Marketplace publish."
            exit 0
          }
          & $publisher.FullName publish `
              -payload "${{ steps.vsix.outputs.path }}" `
              -publishManifest "publish-manifest.json" `
              -personalAccessToken $env:VS_MARKETPLACE_PAT
